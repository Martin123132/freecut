name: Bug report
description: Report something that is broken or behaving unexpectedly.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve FreeCut. Please do not attach private videos or sensitive project files.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: Importing a vertical MP4 fails after the preview loads.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest set of steps that reproduces the issue.
      placeholder: |
        1. Open FreeCut
        2. Import a 1080x1920 MP4
        3. Drag the clip to the timeline
        4. Press export
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: The clip exports successfully.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: Export stops at 0% with an error.
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or 8ed1409
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: Chrome 126, Edge 126, Firefox 127
    validations:
      required: true
  - type: textarea
    id: media
    attributes:
      label: Media details
      description: Format, codec, duration, resolution, frame rate, and whether a synthetic sample can be shared.
      placeholder: MP4, H.264, 24 seconds, 1080x1920, 30 fps.
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant console output or add screenshots. Remove private paths and sensitive details.
      render: shell
