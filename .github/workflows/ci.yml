name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build and import smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Import transition smoke
        run: npx playwright test tests/freecut-import-transition.spec.ts
