name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build and import smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Build
        run: npm run build

      - name: Import and export smoke
        env:
          FREECUT_FFMPEG_PATH: ffmpeg
        run: npx playwright test tests/project-schema.spec.ts tests/freecut-runtime.spec.ts tests/freecut-import-transition.spec.ts tests/freecut-export-job.spec.ts tests/freecut-export-output.spec.ts
